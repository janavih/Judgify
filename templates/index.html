<!DOCTYPE html>
<html>
<head>
    <title>Judgify ⚖️</title>
    <style>
        body {
            font-family: Arial;
            background: #343541;
            color: white;
        }

        .chat-container {
            width: 60%;
            margin: auto;
            margin-top: 50px;
        }

        .chat-box {
            height: 400px;
            overflow-y: auto;
            background: #444654;
            padding: 10px;
            border-radius: 10px;
        }

        .user, .bot {
            margin: 10px;
            padding: 10px;
            border-radius: 8px;
            max-width: 70%;
        }

        .user {
            background: #0b93f6;
            margin-left: auto;
        }

        .bot {
            background: #1e1f25;
            border-left: 4px solid #00ff9d;
            line-height: 1.6;
        }

        input {
            width: 80%;
            padding: 10px;
        }

        button {
            padding: 10px;
        }
    </style>
</head>

<body>

<div class="chat-container">
    <h1>⚖️ Judgify</h1>

    <div id="chat-box" class="chat-box"></div>

    <input id="query" type="text" placeholder="Ask your legal question...">
    <button onclick="send()">Send</button>
</div>

<script>
async function send() {
    let input = document.getElementById("query");
    let query = input.value;

    if (!query) return;

    addMessage(query, "user");
    input.value = "";

    let res = await fetch("/ask", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({query})
    });

    let data = await res.json();

    let reply = `
📜 <b>Law:</b> ${data.law}<br>
📖 <b>Explanation:</b> ${data.explanation}<br>
🪜 <b>Steps:</b><br>
${data.steps.split(";").map(s => "• " + s).join("<br>")}
`;

    addMessage(reply, "bot");
}

function addMessage(text, type) {
    let chatBox = document.getElementById("chat-box");

    let div = document.createElement("div");
    div.className = type;
    div.innerHTML = text;

    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

document.getElementById("query").addEventListener("keypress", function(e) {
    if (e.key === "Enter") send();
});
</script>

</body>
</html>
